services:
  db:
    container_name: ${CONTAINER_NAME_PREFIX}_db_dev
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  minio:
    container_name: ${CONTAINER_NAME_PREFIX}_minio_dev
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/var/lib/minio/data
    networks:
      - app-network
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /var/lib/minio/data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge
    name: ${CONTAINER_NAME_PREFIX}_network
