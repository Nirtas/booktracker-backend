services:
  db:
    container_name: ${CONTAINER_NAME_PREFIX}_db
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  minio:
    container_name: ${CONTAINER_NAME_PREFIX}_minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/var/lib/minio/data
    networks:
      - app-network
    command: server /var/lib/minio/data --console-address ":9001"

  backend:
    container_name: ${CONTAINER_NAME_PREFIX}_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - minio
    env_file:
      - .env
    environment:
      DB_HOST: db
      POSTGRES_PORT: 5432
      MINIO_URL: http://minio:9000
    networks:
      - app-network
    ports:
      - "${BACKEND_PORT:-4000}:8080"

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge
    name: ${CONTAINER_NAME_PREFIX}_network
