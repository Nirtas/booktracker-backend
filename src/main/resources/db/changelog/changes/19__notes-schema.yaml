databaseChangeLog:
  - changeSet:
      id: 19__create-notes-table
      author: Jerael
      comment: create notes table
      preconditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: notes
      changes:
        - createTable:
            tableName: notes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: book_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: text_content
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: file_name
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: page_number
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: notes
            columnNames: id
            constraintName: pk_notes
        - addForeignKeyConstraint:
            baseTableName: notes
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_notes_book_id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_notes_book_id
            using: btree
            tableName: notes
            columns:
              - column:
                  name: book_id