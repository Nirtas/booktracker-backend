databaseChangeLog:
  - changeSet:
      id: 04__create-book_genres-table
      author: Jerael
      comment: create book_genres table
      preconditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: book_genres
      changes:
        - createTable:
            tableName: book_genres
            columns:
              - column:
                  name: book_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: genre_id
                  type: integer
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: book_genres
            columnNames: book_id, genre_id
            constraintName: pk_book_genres
        - addForeignKeyConstraint:
            baseTableName: book_genres
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: book_id
            constraintName: fk_book_genres_book_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: book_genres
            baseColumnNames: genre_id
            referencedTableName: genres
            referencedColumnNames: genre_id
            constraintName: fk_book_genres_genre_id
            onDelete: CASCADE