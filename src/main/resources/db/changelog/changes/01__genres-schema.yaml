databaseChangeLog:
  - changeSet:
      id: 01__create-genres-table
      author: Jerael
      comment: create genres table
      preconditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: genres
      changes:
        - createTable:
            tableName: genres
            columns:
              - column:
                  name: genre_id
                  type: integer
                  autoIncrement: true
                  constraints:
                    nullable: false
              - column:
                  name: genre_name
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_genres_genre_name
        - addPrimaryKey:
            tableName: genres
            columnNames: genre_id
            constraintName: pk_genres