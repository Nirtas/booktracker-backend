databaseChangeLog:
  - changeSet:
      id: 11__сreate-email_verifications-table
      author: Jerael
      comment: сreate email_verifications table
      preconditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: email_verifications
      changes:
        - createTable:
            tableName: email_verifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: verification_type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: email_verifications
            columnNames: id
            constraintName: pk_email_verifications
        - addForeignKeyConstraint:
            baseTableName: email_verifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_email_verifications_user_id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_email_verifications_expires_at
            using: btree
            tableName: email_verifications
            columns:
              - column:
                  name: expires_at
        - createIndex:
            indexName: idx_email_verifications_user_id_type
            using: btree
            tableName: email_verifications
            columns:
              - column:
                  name: user_id
              - column:
                  name: verification_type