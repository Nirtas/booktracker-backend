databaseChangeLog:
  - changeSet:
      id: 12__create-refresh_tokens-table
      author: Jerael
      comment: create refresh_tokens table
      preconditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: refresh_tokens
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: refresh_tokens
            columnNames: id
            constraintName: pk_refresh_tokens
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_refresh_tokens_user_id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_refresh_tokens_user_id
            using: btree
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_refresh_tokens_expires_at
            using: btree
            tableName: refresh_tokens
            columns:
              - column:
                  name: expires_at