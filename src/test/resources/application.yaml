spring:
  datasource:
    url: jdbc:tc:postgresql:17.4-alpine:///test
    hikari:
      maximum-pool-size: 2

  liquibase:
    change-log: classpath:/db/changelog/test-changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 10MB

app:
  web:
    max-file-size: ${spring.servlet.multipart.max-file-size}
  minio:
    url: http://localhost:9000
    user: testuser
    password: testpassword
    url-expiry: 1h
    buckets:
      covers: covers
  smtp:
    from: test@example.com