spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    username: test
    password: test

  liquibase:
    change-log: classpath:/db/changelog/test-changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 10MB

app:
  web:
    max-file-size: ${spring.servlet.multipart.max-file-size}
  minio:
    url: http://localhost:9000
    user: testuser
    password: testpassword
    url-expiry: 1h
    buckets:
      covers: covers
  smtp:
    from: test@example.com