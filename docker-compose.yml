services:
  db:
    container_name: ${CONTAINER_NAME_PREFIX}_db
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  pgadmin:
    container_name: ${CONTAINER_NAME_PREFIX}_pgadmin
    image: dpage/pgadmin4:9.12
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SETUP_SERVERS: "1"
    volumes:
      - ./pgadmin-config/servers.json:/pgadmin4/servers.json
      - ./pgadmin-config/pgpass:/var/lib/pgadmin/pgpass
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    ports:
      - "${PGADMIN_PORT:-5050}:80"

  minio:
    container_name: ${CONTAINER_NAME_PREFIX}_minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/var/lib/minio/data
    networks:
      - app-network
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /var/lib/minio/data --console-address ":9001"

  backend-dev:
    container_name: ${CONTAINER_NAME_PREFIX}_backend_dev
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      MINIO_HOST: minio
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network
    ports:
      - "${BACKEND_PORT:-4000}:8080"

  backend-prod:
    container_name: ${CONTAINER_NAME_PREFIX}_backend_prod
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      MINIO_HOST: minio
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network
    ports:
      - "${BACKEND_PORT:-4000}:8080"

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

networks:
  app-network:
    driver: bridge
    name: ${CONTAINER_NAME_PREFIX}_network
